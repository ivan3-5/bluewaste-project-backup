name: bluewaste_mobile_flutter
description: Flutter replacement mobile app for BlueWaste System
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  geolocator: ^12.0.0
  intl: ^0.19.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/logo-bluewaste.png
  adaptive_icon_foreground: assets/images/logo-bluewaste.png
  adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo-bluewaste.png
  android: true
  ios: false
  web: false
  android_gravity: center
  fullscreen: true
  android_12:
    color: "#FFFFFF"
    image: assets/images/logo-bluewaste.png
    icon_background_color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/charls.png
    - assets/images/logo-bluewaste.png
